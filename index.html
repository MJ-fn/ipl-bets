  async function renderMatches(main){
    main.innerHTML = `<div class="page-header"><span class="page-title">📅 Matches</span></div><div id="match-list" class="match-list"></div>`;
    const [betsSnap, resultsSnap] = await Promise.all([
      get(dbRef(`bets/${currentUid}`)),
      get(dbRef("results"))
    ]);
    const myBets   = betsSnap.exists()    ? betsSnap.val()    : {};
    const results  = resultsSnap.exists() ? resultsSnap.val() : {};
    const ml = $("match-list");

    for(const m of MATCHES){
      const result = results[m.id];
      const myBet  = myBets[m.id];
      const [mHour] = m.time.split(":").map(Number);
      const betCutoff = new Date(`${m.date}T${mHour.toString().padStart(2,"0")}:45:00`);
      const isPast = betCutoff <= new Date();
      const card = document.createElement("div");
      card.className = "match-card" + (isPast?" match-past":"") + (result?" match-done":"");

      const meta1 = TEAM_META[m.team1]; const meta2 = TEAM_META[m.team2];
      let statusHtml = "";
      if(result){
        const win = result.winner;
        statusHtml = `<div class="result-badge" style="color:${TEAM_META[win]?.color||'#fff'}">✅ ${win} won</div>`;
        if(myBet){
          const won = myBet.team === win;
          statusHtml += `<div class="my-bet-result ${won?'bet-won':'bet-lost'}">${won?'🤑 You won':'😔 You lost'} ${formatINR(myBet.amount)}</div>`;
        }
      } else if(myBet){
        statusHtml = `<div class="my-bet-pill" style="border-color:${TEAM_META[myBet.team]?.color||'#fff'}">🎯 Bet: ${myBet.team} — ${formatINR(myBet.amount)}</div>`;
      }

      const canBet    = !isPast && !result && !myBet;
      const canChange = !isPast && !result && !!myBet;

      card.innerHTML = `
        <div class="match-meta">${fmtDate(m.date)} · ${m.time} IST · ${m.venue}</div>
        <div class="match-teams">
          <span class="team-badge" style="color:${meta1.color}">${m.team1}</span>
          <span class="vs">VS</span>
          <span class="team-badge" style="color:${meta2.color}">${m.team2}</span>
        </div>
        ${statusHtml}
        ${(canBet || canChange) ? `
        <div class="bet-form" id="bf-${m.id}">
          <div class="bet-team-choice">
            <button class="bet-team-btn ${canChange && myBet.team===m.team1 ? 'selected' : ''}" id="bt-${m.id}-${m.team1}" onclick="selectBetTeam('${m.id}','${m.team1}','${m.team2}')" style="--tc:${meta1.color}">${m.team1}</button>
            <button class="bet-team-btn ${canChange && myBet.team===m.team2 ? 'selected' : ''}" id="bt-${m.id}-${m.team2}" onclick="selectBetTeam('${m.id}','${m.team2}','${m.team1}')" style="--tc:${meta2.color}">${m.team2}</button>
          </div>
          <div class="bet-amount-row">
            <input type="number" id="ba-${m.id}" placeholder="Amount (₹)" min="1" class="bet-input" value="${canChange ? myBet.amount : ''}"/>
            <button class="place-bet-btn ${canChange ? 'change-bet-btn' : ''}" onclick="placeBet('${m.id}','${m.team1}','${m.team2}')">${canChange ? 'Change Bet' : 'Place Bet'}</button>
          </div>
        </div>` : ""}
      `;
      ml.appendChild(card);
      // Pre-select existing bet team so the button is ready to change
      if(canChange){ selectedTeams[m.id] = myBet.team; }
    }
  }

  let selectedTeams = {}; // matchId → team
  window.selectBetTeam = function(mid, team, other){
    selectedTeams[mid] = team;
    const meta = TEAM_META[team];
    const b1 = $(`bt-${mid}-${team}`);
    const b2 = $(`bt-${mid}-${other}`);
    if(b1){ b1.classList.add("selected"); b1.style.setProperty("--tc", meta.color); }
    if(b2){ b2.classList.remove("selected"); }
  };

  window.placeBet = async function(mid, t1, t2){
    const team   = selectedTeams[mid];
    const amount = parseInt($(`ba-${mid}`).value);
    if(!team){ toast("Pick a team first!", "error"); return; }
    if(!amount || amount < 1){ toast("Enter a valid amount!", "error"); return; }

    // Bets close at HH:45 on match day (15 min before start)
    const match = MATCHES.find(m=>m.id===mid);
    const [mHour] = match.time.split(":").map(Number);
    const cutoff = new Date(`${match.date}T${mHour.toString().padStart(2,"0")}:45:00`);
    if(new Date() >= cutoff){
      toast("Bets closed for this match!", "error"); return;
    }
    try {
      const existingSnap = await get(dbRef(`bets/${currentUid}/${mid}`));
      const isChange = existingSnap.exists();
      await set(dbRef(`bets/${currentUid}/${mid}`), { team, amount, ts: Date.now() });
      toast(isChange ? `Bet updated: ${team} for ${formatINR(amount)} 🔄` : `Bet placed: ${team} for ${formatINR(amount)} 🏏`, "success");
      renderMatches($("main-content"));
    } catch(e){ toast(e.message, "error"); }
  };

  // ══════════════════════════════════════════════

  async function renderLeaderboard(main){
    main.innerHTML = `<div class="page-header"><span class="page-title">🏆 Leaderboard</span></div><div class="lb-loading">Loading…</div>`;

    const [usersSnap, betsSnap, resultsSnap] = await Promise.all([
      get(dbRef("users")),
      get(dbRef("bets")),
      get(dbRef("results"))
    ]);

    const users   = usersSnap.exists()   ? usersSnap.val()   : {};
    const allBets = betsSnap.exists()    ? betsSnap.val()    : {};
    const results = resultsSnap.exists() ? resultsSnap.val() : {};

    // Compute P&L for each user
    const rows = [];
    for(const [uid, u] of Object.entries(users)){
      let profit = 0, wins = 0, losses = 0, pending = 0;
      const myBets = allBets[uid] || {};
      for(const [mid, bet] of Object.entries(myBets)){
        const res = results[mid];
        if(!res){ pending++; continue; }
        if(res.winner === bet.team){
          // Count how many others lost on this match
          let payout = 0;
          for(const [ouid, obets] of Object.entries(allBets)){
            if(ouid === uid) continue;
            const ob = obets[mid];
            if(ob && ob.team !== bet.team) payout += ob.amount;
          }
          profit += payout; wins++;
        } else {
          // Count how many others won on this match
          let lost = 0;
          for(const [ouid, obets] of Object.entries(allBets)){
            if(ouid === uid) continue;
            const ob = obets[mid];
            if(ob && ob.team === results[mid]?.winner) lost += bet.amount/
              Object.values(allBets).filter(b=>b[mid]&&b[mid].team===results[mid].winner).length || 1;
          }
          profit -= bet.amount; losses++;
        }
      }
      const winRate = (wins+losses)>0 ? Math.round(wins/(wins+losses)*100) : 0;
      rows.push({ name: u.name||u.email, email: u.email, profit, wins, losses, winRate, pending });
    }
    rows.sort((a,b)=>b.profit-a.profit);

    let html = `<div class="page-header"><span class="page-title">🏆 Leaderboard</span></div>
    <table class="lb-table">
      <thead><tr><th>#</th><th>Player</th><th>P&amp;L</th><th>Win %</th><th>W/L</th></tr></thead><tbody>`;
    rows.forEach((r,i)=>{
      const pos = i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}`;
      const plc = r.profit>0?"profit-pos":r.profit<0?"profit-neg":"";
      html+=`<tr class="${r.email===currentUser.email?"my-row":""}">
        <td>${pos}</td>
        <td class="lb-name">${r.name}${r.email===currentUser.email?' <span class="you-tag">you</span>':''}</td>
        <td class="lb-pl ${plc}">${r.profit>=0?"+":""}${formatINR(r.profit)}</td>
        <td>${r.winRate}%</td>
        <td>${r.wins}W ${r.losses}L</td>
      </tr>`;
    });
    html += `</tbody></table>`;
    main.innerHTML = html;
  }

  // ══════════════════════════════════════════════
  async function renderAccount(main){
    const [userSnap, betsSnap, resultsSnap, allBetsSnap] = await Promise.all([
      get(dbRef(`users/${currentUid}`)),
      get(dbRef(`bets/${currentUid}`)),
      get(dbRef("results")),
      get(dbRef("bets"))
    ]);

    const u       = userSnap.exists()    ? userSnap.val()    : {};
    const myBets  = betsSnap.exists()    ? betsSnap.val()    : {};
    const results = resultsSnap.exists() ? resultsSnap.val() : {};
    const allBets = allBetsSnap.exists() ? allBetsSnap.val() : {};

    let profit=0, wins=0, losses=0;
    const betRows = [];
    for(const [mid, bet] of Object.entries(myBets)){
      const match = MATCHES.find(m=>m.id===mid);
      if(!match) continue;
      const res = results[mid];
      let pnl = null, status = "pending";
      if(res){
        if(res.winner === bet.team){
          let payout = 0;
          for(const [ouid, obets] of Object.entries(allBets)){
            if(ouid === currentUid) continue;
            const ob = obets[mid];
            if(ob && ob.team !== bet.team) payout += ob.amount;
          }
          pnl = payout; profit+=pnl; wins++; status="won";
        } else {
          pnl = -bet.amount; profit+=pnl; losses++; status="lost";
        }
      }
      betRows.push({match, bet, pnl, status});
    }
    betRows.sort((a,b)=>new Date(b.match.date)-new Date(a.match.date));
    const winRate = (wins+losses)>0 ? Math.round(wins/(wins+losses)*100) : 0;

    let betHistHtml = betRows.length ? betRows.map(r=>{
      const mc = TEAM_META[r.bet.team];
      return `<div class="bet-history-row ${r.status}">
        <div class="bh-match">${r.match.team1} vs ${r.match.team2} <span class="bh-date">${fmtDate(r.match.date)}</span></div>
        <div class="bh-detail">
          <span style="color:${mc?.color||'#fff'}">${r.bet.team}</span> · ${formatINR(r.bet.amount)}
          ${r.pnl!==null?`<span class="bh-pnl ${r.status==="won"?"profit-pos":"profit-neg"}">${r.pnl>=0?"+":""}${formatINR(r.pnl)}</span>`:`<span class="bh-pending">⏳</span>`}
        </div>
      </div>`;
    }).join("") : `<div class="empty-state">No bets yet. Go place some! 🏏</div>`;

    main.innerHTML = `
    <div class="page-header"><span class="page-title">👤 My Account</span></div>
    <div class="account-stats">
      <div class="stat-card"><div class="stat-val ${profit>=0?"profit-pos":"profit-neg"}">${profit>=0?"+":""}${formatINR(profit)}</div><div class="stat-label">Total P&amp;L</div></div>
      <div class="stat-card"><div class="stat-val">${winRate}%</div><div class="stat-label">Win Rate</div></div>
      <div class="stat-card"><div class="stat-val">${wins}</div><div class="stat-label">Wins</div></div>
      <div class="stat-card"><div class="stat-val">${losses}</div><div class="stat-label">Losses</div></div>
    </div>
    <div class="section-title">Bet History</div>
    <div class="bet-history">${betHistHtml}</div>`;
  }

  // ══════════════════════════════════════════════
  //  ADMIN PAGE
  // ══════════════════════════════════════════════
  async function renderAdmin(main, activeTab="pending"){
    if(!isAdmin){ main.innerHTML=`<div class="empty-state">⛔ Access denied</div>`; return; }

    const [resultsSnap, betsSnap, usersSnap] = await Promise.all([
      get(dbRef("results")),
      get(dbRef("bets")),
      get(dbRef("users"))
    ]);
    const results = resultsSnap.exists() ? resultsSnap.val() : {};
    const allBets = betsSnap.exists()    ? betsSnap.val()    : {};
    const users   = usersSnap.exists()   ? usersSnap.val()   : {};

    // Show ALL unresolved matches (admin can declare result at any time)
    const pendingMatches = MATCHES.filter(m=> !results[m.id]);
    const resolvedMatches = MATCHES.filter(m=> results[m.id]);

    let pendingHtml = "";
    if(pendingMatches.length){
      pendingHtml = pendingMatches.map(m=>{
        const isPast = new Date(`${m.date}T${m.time}`) < new Date();
        const tag = isPast
          ? `<span class="admin-past-tag">Played</span>`
          : `<span class="admin-future-tag">Upcoming</span>`;
        return `
        <div class="admin-match-card">
          <div class="admin-match-header">
            <div class="admin-match-label">${m.team1} vs ${m.team2}</div>
            ${tag}
          </div>
          <div class="admin-match-meta">${fmtDate(m.date)} · ${m.time} IST · ${m.venue}</div>
          <div class="admin-bet-summary">${getBetSummary(m.id, allBets, m)}</div>
          <div class="admin-result-btns">
            <button class="admin-win-btn" style="--tc:${TEAM_META[m.team1]?.color||'#555'}" onclick="setResult('${m.id}','${m.team1}','${m.team2}','${m.team1}')">${m.team1} Won</button>
            <button class="admin-win-btn" style="--tc:${TEAM_META[m.team2]?.color||'#555'}" onclick="setResult('${m.id}','${m.team1}','${m.team2}','${m.team2}')">${m.team2} Won</button>
          </div>
        </div>`;
      }).join("");
    } else {
      pendingHtml = `<div class="empty-state">All matches resolved 🎉</div>`;
    }

    const resolvedHtml = resolvedMatches.length ? resolvedMatches.map(m=>{
      const res = results[m.id];
      return `<div class="resolved-row">
        <div>
          <div style="font-weight:700;font-size:.85rem">${m.team1} vs ${m.team2}</div>
          <div style="font-size:.75rem;color:var(--muted);margin-top:.1rem">${fmtDate(m.date)}</div>
        </div>
        <span class="winner-tag">${res.winner} won</span>
        <button class="undo-btn" onclick="setAdminTab('resolved');undoResult('${m.id}')">Undo</button>
      </div>`;
    }).join("") : `<div class="empty-state">No results declared yet.</div>`;

    const pendCount = pendingMatches.length;
    const resCount  = resolvedMatches.length;

    main.innerHTML = `
    <div class="page-header"><span class="page-title">Admin Panel</span></div>
    <div class="admin-tabs">
      <button class="admin-tab ${activeTab==='pending'?'active':''}" onclick="setAdminTab('pending')">Pending <span class="tab-count">${pendCount}</span></button>
      <button class="admin-tab ${activeTab==='resolved'?'active':''}" onclick="setAdminTab('resolved')">Resolved <span class="tab-count">${resCount}</span></button>
    </div>
    <div id="admin-tab-pending" style="display:${activeTab==='pending'?'flex':'none'};flex-direction:column;gap:.6rem">${pendingHtml}</div>
    <div id="admin-tab-resolved" style="display:${activeTab==='resolved'?'flex':'none'};flex-direction:column;gap:.5rem">${resolvedHtml}</div>`;
  }

  window.setAdminTab = function(tab){
    $("admin-tab-pending").style.display  = tab==="pending"  ? "flex":"none";
    $("admin-tab-resolved").style.display = tab==="resolved" ? "flex":"none";
    document.querySelectorAll(".admin-tab").forEach(b=>{
      b.classList.toggle("active", b.textContent.toLowerCase().startsWith(tab));
    });
  };

  function getBetSummary(mid, allBets, match){
    let t1=0,t2=0,t1c=0,t2c=0;
    for(const [uid, bets] of Object.entries(allBets)){
      const b = bets[mid];
      if(!b) continue;
      if(b.team===match.team1){t1+=b.amount;t1c++;}
      else{t2+=b.amount;t2c++;}
    }
    return `${match.team1}: ${formatINR(t1)} (${t1c} bets) | ${match.team2}: ${formatINR(t2)} (${t2c} bets)`;
  }

  window.setResult = async function(mid, t1, t2, winner){
    if(!confirm(`Confirm: ${winner} won the match?`)) return;
    await set(dbRef(`results/${mid}`), { winner, ts: Date.now() });
    toast(`Result saved: ${winner} won! ✅`, "success");
    renderAdmin($("main-content"));
  };

  window.undoResult = async function(mid){
    if(!confirm("Undo this result? All P&L from this match will be recalculated.")) return;
    await set(dbRef(`results/${mid}`), null);
    toast("Result undone.", "info");
    renderAdmin($("main-content"));
  };

  // Expose for HTML auth tabs
  window.switchTab = function(tab){
    $("tab-login").classList.toggle("active", tab==="login");
    $("tab-register").classList.toggle("active", tab==="register");
    $("login-form").style.display  = tab==="login"  ? "block":"none";
    $("register-form").style.display = tab==="register" ? "block":"none";
  };
</script>

.admin-match-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:.15rem; }
.admin-match-meta { font-size:.73rem; color:var(--muted); margin-bottom:.5rem; font-weight:600; }
.admin-past-tag {
  font-size:.68rem; font-weight:700; background:var(--accent-soft); color:var(--accent);
  padding:.12rem .5rem; border-radius:6px; border:1px solid color-mix(in srgb,var(--accent) 30%,var(--border));
}
.admin-future-tag {
  font-size:.68rem; font-weight:700; background:var(--green-soft); color:var(--green);
  padding:.12rem .5rem; border-radius:6px; border:1px solid color-mix(in srgb,var(--green) 30%,var(--border));
}
.winner-tag {
  font-size:.78rem; font-weight:700; background:var(--green-soft); color:var(--green);
  padding:.2rem .55rem; border-radius:8px; margin-left:auto; white-space:nowrap;
}

@media(max-width:480px){
  .account-stats { grid-template-columns:1fr 1fr; }
  #main-content { padding: .75rem .75rem 0; }
}
</style>
</head>

<body>

<!-- ── AUTH SCREEN ── -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>IPL BETTING</h1>
      <p>IPL 2026 · Private League</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login -->
    <div id="login-form">
      <div class="auth-form">
        <input class="auth-input" id="login-email" type="email" placeholder="Email" />
        <input class="auth-input" id="login-pass"  type="password" placeholder="Password" />
        <button class="auth-btn" onclick="doLogin()">Sign In 🏏</button>
      </div>
    </div>

    <!-- Register -->
    <div id="register-form" style="display:none">
      <div class="auth-form">
        <input class="auth-input" id="reg-name"  type="text"     placeholder="Your name" />
        <input class="auth-input" id="reg-email" type="email"    placeholder="Email" />
        <input class="auth-input" id="reg-pass"  type="password" placeholder="Password (min 6 chars)" />
        <input class="auth-input" id="reg-code"  type="text"     placeholder="Squad code" />
        <button class="auth-btn" onclick="doRegister()">Join the League 🔥</button>
        <p class="code-hint">Ask your group admin for the squad code</p>
      </div>
    </div>
  </div>
</div>

<!-- ── APP SCREEN ── -->
<div id="app-screen">
  <header class="app-header">
    <span class="app-header-logo">IPL BETTING</span>
    <div class="app-header-right">
      <span id="user-name-display"></span>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </header>

  <div id="main-content"></div>

  <nav>
    <button class="nav-btn active" data-page="matches" onclick="loadPage('matches')">
      <span class="nav-icon">📅</span>Matches
    </button>
    <button class="nav-btn" data-page="leaderboard" onclick="loadPage('leaderboard')">
      <span class="nav-icon">🏆</span>Leaderboard
    </button>
    <button class="nav-btn" data-page="account" onclick="loadPage('account')">
      <span class="nav-icon">👤</span>Account
    </button>
    <button class="nav-btn" data-page="admin" onclick="loadPage('admin')" id="admin-nav-link">
      <span class="nav-icon">⚙️</span>Admin
    </button>
  </nav>
</div>

</body>
</html>
