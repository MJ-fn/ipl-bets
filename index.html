  async function renderMatches(main){

        const win = result.winner;
        statusHtml = `<div class="result-badge" style="color:${TEAM_META[win]?.color||'#fff'}">✅ ${win} won</div>`;

          statusHtml += `<div class="my-bet-result ${won?'bet-won':'bet-lost'}">${won?'🤑 You won':'😔 You lost'} ${formatINR(myBet.amount)}</div>`;
        }
      } else if(myBet){

      }

      const canBet = !isPast && !result && !myBet;

      card.innerHTML = `
        <div class="match-meta">${fmtDate(m.date)} · ${m.time} IST · ${m.venue}</div>
        <div class="match-teams">
          <span class="team-badge" style="color:${meta1.color}">${m.team1}</span>
          <span class="vs">VS</span>
          <span class="team-badge" style="color:${meta2.color}">${m.team2}</span>
        </div>
        ${statusHtml}
        ${canBet ? `
        <div class="bet-form" id="bf-${m.id}">
          <div class="bet-team-choice">
            <button class="bet-team-btn" id="bt-${m.id}-${m.team1}" onclick="selectBetTeam('${m.id}','${m.team1}','${m.team2}')" style="--tc:${meta1.color}">${m.team1}</button>
            <button class="bet-team-btn" id="bt-${m.id}-${m.team2}" onclick="selectBetTeam('${m.id}','${m.team2}','${m.team1}')" style="--tc:${meta2.color}">${m.team2}</button>
          </div>
          <div class="bet-amount-row">
            <input type="number" id="ba-${m.id}" placeholder="Amount (₹)" min="1" class="bet-input"/>
            <button class="place-bet-btn" onclick="placeBet('${m.id}','${m.team1}','${m.team2}')">Place Bet</button>
          </div>
        </div>` : ""}
      `;
      ml.appendChild(card);
    }
  }

    if(!amount || amount < 1){ toast("Enter a valid amount!", "error"); return; }

  async function renderLeaderboard(main){
    main.innerHTML = `<div class="page-header"><span class="page-title">🏆 Leaderboard</span></div><div class="lb-loading">Loading…</div>`;

    const [usersSnap, betsSnap, resultsSnap] = await Promise.all([
      get(dbRef("users")),
      get(dbRef("bets")),
      get(dbRef("results"))
    ]);

    const users   = usersSnap.exists()   ? usersSnap.val()   : {};
    const allBets = betsSnap.exists()    ? betsSnap.val()    : {};
    const results = resultsSnap.exists() ? resultsSnap.val() : {};

    // Compute P&L for each user
    const rows = [];
    for(const [uid, u] of Object.entries(users)){
      let profit = 0, wins = 0, losses = 0, pending = 0;
      const myBets = allBets[uid] || {};
      for(const [mid, bet] of Object.entries(myBets)){
        const res = results[mid];
        if(!res){ pending++; continue; }
        if(res.winner === bet.team){
          // Count how many others lost on this match
          let payout = 0;
          for(const [ouid, obets] of Object.entries(allBets)){
            if(ouid === uid) continue;
            const ob = obets[mid];
            if(ob && ob.team !== bet.team) payout += ob.amount;
          }
          profit += payout; wins++;
        } else {
          // Count how many others won on this match
          let lost = 0;
          for(const [ouid, obets] of Object.entries(allBets)){
            if(ouid === uid) continue;
            const ob = obets[mid];
            if(ob && ob.team === results[mid]?.winner) lost += bet.amount/
              Object.values(allBets).filter(b=>b[mid]&&b[mid].team===results[mid].winner).length || 1;
          }
          profit -= bet.amount; losses++;
        }
      }
      const winRate = (wins+losses)>0 ? Math.round(wins/(wins+losses)*100) : 0;
      rows.push({ name: u.name||u.email, email: u.email, profit, wins, losses, winRate, pending });
    }
    rows.sort((a,b)=>b.profit-a.profit);

    let html = `<div class="page-header"><span class="page-title">🏆 Leaderboard</span></div>
    <table class="lb-table">
      <thead><tr><th>#</th><th>Player</th><th>P&amp;L</th><th>Win %</th><th>W/L</th></tr></thead><tbody>`;
    rows.forEach((r,i)=>{
      const pos = i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}`;
      const plc = r.profit>0?"profit-pos":r.profit<0?"profit-neg":"";
      html+=`<tr class="${r.email===currentUser.email?"my-row":""}">
        <td>${pos}</td>
        <td class="lb-name">${r.name}${r.email===currentUser.email?' <span class="you-tag">you</span>':''}</td>
        <td class="lb-pl ${plc}">${r.profit>=0?"+":""}${formatINR(r.profit)}</td>
        <td>${r.winRate}%</td>
        <td>${r.wins}W ${r.losses}L</td>
      </tr>`;
    });
    html += `</tbody></table>`;
    main.innerHTML = html;
  }

      if(res){
        if(res.winner === bet.team){
          let payout = 0;
          for(const [ouid, obets] of Object.entries(allBets)){
            if(ouid === currentUid) continue;
            const ob = obets[mid];
            if(ob && ob.team !== bet.team) payout += ob.amount;
          }
          pnl = payout; profit+=pnl; wins++; status="won";
        } else {
          pnl = -bet.amount; profit+=pnl; losses++; status="lost";
        }
      }
      betRows.push({match, bet, pnl, status});
    }
    betRows.sort((a,b)=>new Date(b.match.date)-new Date(a.match.date));
    const winRate = (wins+losses)>0 ? Math.round(wins/(wins+losses)*100) : 0;

    let betHistHtml = betRows.length ? betRows.map(r=>{
      const mc = TEAM_META[r.bet.team];
      return `<div class="bet-history-row ${r.status}">
        <div class="bh-match">${r.match.team1} vs ${r.match.team2} <span class="bh-date">${fmtDate(r.match.date)}</span></div>
        <div class="bh-detail">
          <span style="color:${mc?.color||'#fff'}">${r.bet.team}</span> · ${formatINR(r.bet.amount)}
          ${r.pnl!==null?`<span class="bh-pnl ${r.status==="won"?"profit-pos":"profit-neg"}">${r.pnl>=0?"+":""}${formatINR(r.pnl)}</span>`:`<span class="bh-pending">⏳</span>`}
        </div>
      </div>`;
    }).join("") : `<div class="empty-state">No bets yet. Go place some! 🏏</div>`;

    main.innerHTML = `
    <div class="page-header"><span class="page-title">👤 My Account</span></div>
    <div class="account-stats">
      <div class="stat-card"><div class="stat-val ${profit>=0?"profit-pos":"profit-neg"}">${profit>=0?"+":""}${formatINR(profit)}</div><div class="stat-label">Total P&amp;L</div></div>
      <div class="stat-card"><div class="stat-val">${winRate}%</div><div class="stat-label">Win Rate</div></div>
      <div class="stat-card"><div class="stat-val">${wins}</div><div class="stat-label">Wins</div></div>
      <div class="stat-card"><div class="stat-val">${losses}</div><div class="stat-label">Losses</div></div>
    </div>
    <div class="section-title">Bet History</div>
    <div class="bet-history">${betHistHtml}</div>`;
  }

  // ══════════════════════════════════════════════
  //  ADMIN PAGE
  // ══════════════════════════════════════════════
  async function renderAdmin(main){
    if(!isAdmin){ main.innerHTML=`<div class="empty-state">⛔ Access denied</div>`; return; }

    const [resultsSnap, betsSnap, usersSnap] = await Promise.all([
      get(dbRef("results")),
      get(dbRef("bets")),
      get(dbRef("users"))
    ]);
    const results = resultsSnap.exists() ? resultsSnap.val() : {};
    const allBets = betsSnap.exists()    ? betsSnap.val()    : {};
    const users   = usersSnap.exists()   ? usersSnap.val()   : {};

    // Only show unresolved matches that are in the past
    const pendingMatches = MATCHES.filter(m=>{
      const past = new Date(`${m.date}T${m.time}`) < new Date();
      return past && !results[m.id];
    });

    let pendingHtml = "";
    if(pendingMatches.length){
      pendingHtml = pendingMatches.map(m=>`
        <div class="admin-match-card">
          <div class="admin-match-label">${fmtDate(m.date)} · ${m.team1} vs ${m.team2}</div>
          <div class="admin-bet-summary">${getBetSummary(m.id, allBets, m)}</div>
          <div class="admin-result-btns">
            <button class="admin-win-btn" style="--tc:${TEAM_META[m.team1]?.color}" onclick="setResult('${m.id}','${m.team1}','${m.team2}','${m.team1}')">${m.team1} Won</button>
            <button class="admin-win-btn" style="--tc:${TEAM_META[m.team2]?.color}" onclick="setResult('${m.id}','${m.team1}','${m.team2}','${m.team2}')">${m.team2} Won</button>
          </div>
        </div>`).join("");
    } else {
      pendingHtml = `<div class="empty-state">No pending results 🎉</div>`;
    }

    // Resolved matches list
    const resolvedHtml = Object.entries(results).map(([mid, res])=>{
      const m = MATCHES.find(x=>x.id===mid);
      if(!m) return "";
      return `<div class="resolved-row">✅ ${m.team1} vs ${m.team2} — <strong>${res.winner}</strong> won
        <button class="undo-btn" onclick="undoResult('${mid}')">Undo</button></div>`;
    }).join("") || `<div class="empty-state">No results declared yet.</div>`;

    main.innerHTML = `
    <div class="page-header"><span class="page-title">⚙️ Admin Panel</span></div>
    <div class="section-title">Pending Results</div>
    <div class="admin-pending">${pendingHtml}</div>
    <div class="section-title" style="margin-top:2rem">Declared Results</div>
    <div class="admin-resolved">${resolvedHtml}</div>`;
  }

  function getBetSummary(mid, allBets, match){
    let t1=0,t2=0,t1c=0,t2c=0;
    for(const [uid, bets] of Object.entries(allBets)){
      const b = bets[mid];
      if(!b) continue;
      if(b.team===match.team1){t1+=b.amount;t1c++;}
      else{t2+=b.amount;t2c++;}
    }
    return `${match.team1}: ${formatINR(t1)} (${t1c} bets) | ${match.team2}: ${formatINR(t2)} (${t2c} bets)`;
  }

  window.setResult = async function(mid, t1, t2, winner){
    if(!confirm(`Confirm: ${winner} won the match?`)) return;
    await set(dbRef(`results/${mid}`), { winner, ts: Date.now() });
    toast(`Result saved: ${winner} won! ✅`, "success");
    renderAdmin($("main-content"));
  };

  window.undoResult = async function(mid){
    if(!confirm("Undo this result? All P&L from this match will be recalculated.")) return;
    await set(dbRef(`results/${mid}`), null);
    toast("Result undone.", "info");
    renderAdmin($("main-content"));
  };

  // Expose for HTML auth tabs
  window.switchTab = function(tab){
    $("tab-login").classList.toggle("active", tab==="login");
    $("tab-register").classList.toggle("active", tab==="register");
    $("login-form").style.display  = tab==="login"  ? "block":"none";
    $("register-form").style.display = tab==="register" ? "block":"none";
  };
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0A0A0F;
  --surface:#141420;
  --card:   #1C1C2E;
  --border: #2A2A40;
  --accent: #FF6B00;
  --gold:   #F5C842;
  --text:   #E8E8F0;
  --muted:  #6B6B8A;
  --radius: 12px;
  --font-display: 'Bebas Neue', cursive;
  --font-body: 'DM Sans', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 60% 30% at 50% 0%, rgba(255,107,0,.12) 0%, transparent 70%),
    radial-gradient(ellipse 40% 20% at 80% 100%, rgba(245,200,66,.06) 0%, transparent 60%);
}

/* ── TOASTS ── */
.toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999;
  padding: .75rem 1.25rem; border-radius: 8px; font-size: .9rem;
  font-weight: 500; animation: slideIn .3s ease; max-width: 320px;
}
.toast-info    { background:#1E3A5F; border-left: 4px solid #4A90D9; }
.toast-success { background:#0F2E1A; border-left: 4px solid #4CAF50; }
.toast-error   { background:#2E0F0F; border-left: 4px solid #EF5350; }
@keyframes slideIn { from{ transform: translateX(120%); opacity:0;} to{transform:translateX(0);opacity:1;} }

/* ── AUTH ── */
#auth-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 1rem;
}
.auth-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 2rem; width: 100%; max-width: 400px;
}
.auth-logo {
  text-align: center; margin-bottom: 1.5rem;
}
.auth-logo h1 {
  font-family: var(--font-display); font-size: 2.8rem; letter-spacing: 2px;
  background: linear-gradient(135deg, var(--accent), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.auth-logo p { color: var(--muted); font-size:.85rem; margin-top:.25rem; }
.auth-tabs { display:flex; gap:.5rem; margin-bottom:1.5rem; }
.auth-tab {
  flex:1; padding:.6rem; border: 1px solid var(--border); background:transparent;
  color: var(--muted); border-radius: 8px; cursor:pointer; font-family:var(--font-body);
  transition: all .2s;
}
.auth-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.auth-form { display:flex; flex-direction:column; gap:.75rem; }
.auth-input {
  padding: .75rem 1rem; background:var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-family:var(--font-body); font-size:.95rem;
  transition: border-color .2s;
}
.auth-input:focus { outline:none; border-color:var(--accent); }
.auth-btn {
  padding: .85rem; background: linear-gradient(135deg, var(--accent), #FF8C00);
  border:none; border-radius:8px; color:#fff; font-family:var(--font-body);
  font-size:1rem; font-weight:700; cursor:pointer; letter-spacing:.5px;
  transition: opacity .2s;
}
.auth-btn:hover { opacity:.9; }
.code-hint { font-size:.75rem; color:var(--muted); text-align:center; }

/* ── APP SHELL ── */
#app-screen { display: none; min-height: 100vh; padding-bottom: 80px; }

/* NAV */
nav {
  position: fixed; bottom:0; left:0; right:0;
  background: rgba(20,20,32,.95); backdrop-filter:blur(16px);
  border-top: 1px solid var(--border); display:flex;
  justify-content:space-around; align-items:center; padding:.5rem 0;
  z-index: 100;
}
.nav-btn {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  background:none; border:none; color:var(--muted); cursor:pointer;
  font-family:var(--font-body); font-size:.7rem; padding:.4rem .8rem;
  border-radius:8px; transition: color .2s;
}
.nav-btn .nav-icon { font-size:1.4rem; line-height:1; }
.nav-btn.active { color: var(--accent); }
#admin-nav-link { display:none; }

/* HEADER */
.app-header {
  display:flex; align-items:center; justify-content:space-between;
  padding: 1rem 1.25rem; background:var(--surface);
  border-bottom: 1px solid var(--border); position:sticky; top:0; z-index:50;
}
.app-header-logo { font-family:var(--font-display); font-size:1.6rem; letter-spacing:2px;
  background: linear-gradient(135deg, var(--accent), var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.app-header-right { display:flex; align-items:center; gap:.75rem; }
#user-name-display { font-size:.85rem; color:var(--muted); }
.logout-btn { background:none; border: 1px solid var(--border); color:var(--muted);
  padding:.3rem .75rem; border-radius:6px; cursor:pointer; font-size:.8rem; }
.logout-btn:hover { border-color:var(--accent); color:var(--accent); }

/* MAIN */
#main-content { padding: 1rem; max-width: 720px; margin: 0 auto; }

.page-header { margin-bottom: 1rem; }
.page-title { font-family:var(--font-display); font-size:2rem; letter-spacing:1px; color:var(--text); }

/* ── MATCHES ── */
.match-list { display:flex; flex-direction:column; gap:.75rem; }

.match-card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 1rem 1.25rem; transition: border-color .2s;
}
.match-card:hover { border-color: #3A3A55; }
.match-past { opacity: .7; }
.match-done { border-color: #2A2A40; }

.match-meta { font-size:.75rem; color:var(--muted); margin-bottom:.5rem; }
.match-teams {
  display:flex; align-items:center; gap:.75rem; margin-bottom:.75rem;
}
.team-badge { font-family:var(--font-display); font-size:1.5rem; letter-spacing:1px; }
.vs { color:var(--muted); font-size:.8rem; font-weight:700; flex:1; text-align:center; }

.result-badge { font-size:.85rem; font-weight:700; margin-bottom:.4rem; }
.my-bet-result { font-size:.85rem; margin-top:.3rem; font-weight:600; }
.bet-won { color: #4CAF50; }
.bet-lost { color: #EF5350; }

.my-bet-pill {
  display:inline-block; padding:.25rem .75rem; border:1px solid;
  border-radius:20px; font-size:.8rem; margin-top:.25rem; color:var(--text);
}

/* Bet form */
.bet-form { margin-top: .75rem; border-top: 1px solid var(--border); padding-top:.75rem; }
.bet-team-choice { display:flex; gap:.5rem; margin-bottom:.5rem; }
.bet-team-btn {
  flex:1; padding:.6rem; background:transparent; border:2px solid var(--border);
  border-radius:8px; color:var(--text); cursor:pointer; font-family:var(--font-display);
  font-size:1.1rem; letter-spacing:1px; transition: all .2s;
}
.bet-team-btn:hover { border-color: var(--tc); color: var(--tc); }
.bet-team-btn.selected { border-color:var(--tc); background: color-mix(in srgb, var(--tc) 15%, transparent); color:var(--tc); }

.bet-amount-row { display:flex; gap:.5rem; }
.bet-input {
  flex:1; padding:.6rem .75rem; background:var(--bg); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-family:var(--font-body); font-size:.9rem;
}
.bet-input:focus { outline:none; border-color:var(--accent); }
.place-bet-btn {
  padding:.6rem 1rem; background:var(--accent); border:none; border-radius:8px;
  color:#fff; font-family:var(--font-body); font-weight:700; cursor:pointer;
  white-space:nowrap; transition: opacity .2s;
}
.place-bet-btn:hover { opacity:.85; }

/* ── LEADERBOARD ── */
.lb-table { width:100%; border-collapse:collapse; }
.lb-table thead tr { border-bottom: 2px solid var(--border); }
.lb-table th { padding:.6rem .75rem; text-align:left; color:var(--muted); font-size:.8rem; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
.lb-table td { padding:.75rem; border-bottom: 1px solid var(--border); font-size:.9rem; }
.lb-table tbody tr:hover { background: rgba(255,107,0,.04); }
.my-row { background: rgba(255,107,0,.08) !important; }
.lb-name { font-weight:600; }
.lb-pl { font-weight:700; }
.you-tag { background:var(--accent); color:#fff; font-size:.65rem; padding:.1rem .4rem; border-radius:10px; margin-left:.3rem; }

/* ── ACCOUNT ── */
.account-stats { display:grid; grid-template-columns:repeat(2,1fr); gap:.75rem; margin-bottom:1.5rem; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:1rem; text-align:center; }
.stat-val { font-family:var(--font-display); font-size:1.8rem; letter-spacing:1px; }
.stat-label { color:var(--muted); font-size:.75rem; margin-top:.25rem; }

.section-title { font-family:var(--font-display); font-size:1.3rem; color:var(--muted); margin-bottom:.75rem; letter-spacing:1px; }

.bet-history { display:flex; flex-direction:column; gap:.5rem; }
.bet-history-row { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:.75rem 1rem; }
.bet-history-row.won  { border-left: 3px solid #4CAF50; }
.bet-history-row.lost { border-left: 3px solid #EF5350; }
.bet-history-row.pending { border-left: 3px solid var(--muted); }
.bh-match { font-size:.85rem; font-weight:600; margin-bottom:.25rem; }
.bh-date { color:var(--muted); font-weight:400; font-size:.8rem; }
.bh-detail { display:flex; align-items:center; gap:.75rem; font-size:.85rem; color:var(--muted); }
.bh-pnl { font-weight:700; margin-left:auto; }
.bh-pending { margin-left:auto; }

/* ── ADMIN ── */
.admin-pending, .admin-resolved { display:flex; flex-direction:column; gap:.75rem; }
.admin-match-card {
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:1rem 1.25rem;
}
.admin-match-label { font-weight:700; margin-bottom:.3rem; }
.admin-bet-summary { font-size:.8rem; color:var(--muted); margin-bottom:.75rem; }
.admin-result-btns { display:flex; gap:.5rem; }
.admin-win-btn {
  flex:1; padding:.6rem; background:transparent; border:2px solid var(--tc);
  border-radius:8px; color:var(--tc); cursor:pointer; font-family:var(--font-display);
  font-size:1.1rem; letter-spacing:1px; transition: all .2s;
}
.admin-win-btn:hover { background:color-mix(in srgb,var(--tc) 20%,transparent); }
.resolved-row {
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:.6rem 1rem; font-size:.85rem; display:flex; align-items:center; gap:.75rem;
}
.undo-btn { margin-left:auto; background:none; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:.2rem .5rem; cursor:pointer; font-size:.75rem; }
.undo-btn:hover { border-color:#EF5350; color:#EF5350; }

/* P&L colors */
.profit-pos { color: #4CAF50; }
.profit-neg { color: #EF5350; }

.empty-state { color:var(--muted); text-align:center; padding:2rem; font-size:.95rem; }
.lb-loading  { color:var(--muted); text-align:center; padding:2rem; }

@media(max-width:480px){
  .account-stats { grid-template-columns:1fr 1fr; }
}
</style>
</head>
